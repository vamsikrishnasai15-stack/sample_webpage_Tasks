<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <style>
        .sai{
            margin-right: 185px;
        }
        .male{
            margin-right: 120px;
        }
        .mid{
            margin-left: 70px;
        }
        #lang{
            margin-right: 122px;
        }
        .number{
            margin-left: 45px;
        }
        .vamsi{
            margin-right: 380px;
        }
            
    
    </style
      
</head>
<body style="text-align: center;">
    <h1>Application form</h1>
    <div>
        <label type="text">First Name</label>
        <input type="text">
        <label type="text">Last Name</label>
        <input type="text">
    </div><br>
    <div class="sai">
        <label type="Date">Date of Birth</label>
        <input type="Date">
        <label type="number">Age</label>
        <input type="number" min="1" max="120">
    </div><br>
    <div class="male">
        <label type="gendert">Gender</label>
        <select type="gender">
            <option>male</option>
            <option>female</option>
        </select>
        <label type="text">Email Adress</label>
        <input type="text">
    </div><br>
    <div class="mid">
        <label type="text">Positions Available</label>
        <input type="radio">Junior Developer
        <input type="radio">Mid-Level Developer
        <input type="radio">Senior Developer
    </div><br>
    <div id="lang">
        <label type="text">programming languagres</label>
        <input type="checkbox">java
        <input type="checkbox">python
        <input type="checkbox">java script
    </div><br>
    <div class="number">
        <label type="password">password</label>
        <input type="password">
        <label type="password">Confirm Password</label>
        <input type="password">
    </div><br>
    <div class="vamsi">
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </div>




    
</body>
</html>
